<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluency Coach AI</title>
    
    <!-- MediaPipe Solutions -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- Environment Shim -->
    <script>
      (function() {
        window.process = window.process || { env: {} };
        window.process.env = window.process.env || {};
      })();
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617; /* slate-950 */
        color: #f8fafc; /* slate-50 */
        margin: 0;
        overflow-x: hidden;
      }
      .recording-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .5; transform: scale(1.1); }
      }
      @keyframes scanner-sweep {
        0% { transform: translateX(-100%); opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { transform: translateX(100%); opacity: 0; }
      }
      @keyframes floating-sparkle {
        0% { transform: translateY(0) scale(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
      }
      .animate-scanner {
        animation: scanner-sweep 3s linear infinite;
      }
      .animate-sparkle {
        animation: floating-sparkle 2s ease-out infinite;
      }
      
      @keyframes thinking-halo {
        0% { transform: rotate(0deg); border-top-color: #6366f1; }
        50% { border-top-color: #ec4899; }
        100% { transform: rotate(360deg); border-top-color: #6366f1; }
      }
      .animate-thinking {
        animation: thinking-halo 2s linear infinite;
      }

      @keyframes breathing-orb {
        0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); }
      }
      .animate-breathing {
        animation: breathing-orb 3s ease-in-out infinite;
      }

      @keyframes wave-grow {
        0%, 100% { height: 8px; }
        50% { height: 24px; }
      }
      .animate-wave-bar {
        animation: wave-grow 0.6s ease-in-out infinite;
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1e293b; 
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #4f46e5;
      }
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #1e293b transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
